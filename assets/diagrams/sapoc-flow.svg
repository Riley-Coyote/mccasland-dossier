<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">SAPOC governance flow preview</title>
  <desc id="desc">A three-tier governance stack showing SAPOC, the Senior Review Group, and the senior working group with McCasland at the administrative center.</desc>
  <rect width="960" height="600" rx="26" fill="#070707"/>
  <g font-family="JetBrains Mono, monospace" letter-spacing="2">
    <rect x="250" y="76" width="460" height="108" rx="24" fill="#111111" stroke="#c9a87c"/>
    <text x="480" y="122" fill="#f6f1ea" font-size="24" text-anchor="middle">SAPOC</text>
    <text x="480" y="150" fill="#c9a87c" font-size="13" text-anchor="middle">DEPSECDEF CHAIR / PORTFOLIO DECISIONS</text>
    <path d="M480 184 480 246" stroke="#5b4a36" stroke-width="2"/>
    <rect x="280" y="246" width="400" height="94" rx="22" fill="#111111" stroke="#70a0d9"/>
    <text x="480" y="286" fill="#e8f1fb" font-size="20" text-anchor="middle">SENIOR REVIEW GROUP</text>
    <text x="480" y="310" fill="#8db0d6" font-size="12" text-anchor="middle">DETAILED SAP REVIEW / RECOMMENDATIONS</text>
    <path d="M480 340 480 402" stroke="#4c6280" stroke-width="2"/>
    <rect x="305" y="402" width="350" height="88" rx="20" fill="#111111" stroke="#56b29a"/>
    <text x="480" y="440" fill="#e2fff5" font-size="18" text-anchor="middle">SAP SENIOR WORKING GROUP</text>
    <text x="480" y="462" fill="#8cc8ba" font-size="12" text-anchor="middle">DECONFLICTION / STAFF ENGINE</text>
    <rect x="62" y="232" width="160" height="130" rx="18" fill="#0c0c0c" stroke="#d4a843"/>
    <text x="142" y="280" fill="#f8edc9" font-size="15" text-anchor="middle">MCCASLAND</text>
    <text x="142" y="307" fill="#d4a843" font-size="12" text-anchor="middle">EXECUTIVE</text>
    <text x="142" y="325" fill="#d4a843" font-size="12" text-anchor="middle">SECRETARY</text>
    <path d="M222 296 280 296" stroke="#6a5632" stroke-width="2"/>
    <rect x="742" y="232" width="156" height="130" rx="18" fill="#0c0c0c" stroke="#c85f88"/>
    <text x="820" y="280" fill="#ffd5e6" font-size="15" text-anchor="middle">CONGRESS</text>
    <text x="820" y="307" fill="#d785a5" font-size="12" text-anchor="middle">10 U.S.C.</text>
    <text x="820" y="325" fill="#d785a5" font-size="12" text-anchor="middle">119 REPORTING</text>
    <path d="M680 296 742 296" stroke="#7a4760" stroke-width="2"/>
  </g>
</svg>
