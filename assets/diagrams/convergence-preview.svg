<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">McCasland convergence map preview</title>
  <desc id="desc">A central node for McCasland connected to SAPOC, AFRL, Kirtland, the disclosure network, Wright-Patterson, and the disappearance.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
  </defs>
  <rect width="960" height="600" rx="26" fill="url(#bg)"/>
  <g opacity=".5" stroke="#3d352b" stroke-width="1">
    <path d="M480 300 165 156"/>
    <path d="M480 300 480 114"/>
    <path d="M480 300 795 156"/>
    <path d="M480 300 220 454"/>
    <path d="M480 300 480 486"/>
    <path d="M480 300 748 454"/>
  </g>
  <circle cx="480" cy="300" r="96" fill="#181410" stroke="#c9a87c" stroke-width="2"/>
  <circle cx="480" cy="300" r="118" fill="none" stroke="#5a4832" stroke-width="1.5"/>
  <text x="480" y="284" fill="#f1efe9" font-size="24" font-family="JetBrains Mono, monospace" text-anchor="middle" letter-spacing="3">MCCASLAND</text>
  <text x="480" y="315" fill="#c9a87c" font-size="14" font-family="JetBrains Mono, monospace" text-anchor="middle" letter-spacing="2">UAP / SAP NEXUS</text>
  <g font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="2" text-anchor="middle">
    <g>
      <circle cx="165" cy="156" r="54" fill="#0f0f0f" stroke="#6c9acd"/>
