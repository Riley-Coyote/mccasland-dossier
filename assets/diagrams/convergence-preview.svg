      <text x="480" y="111" fill="#e0fff5">AFRL</text>
      <text x="480" y="131" fill="#91cbbd">COMMAND</text>
    </g>
    <g>
      <circle cx="795" cy="156" r="54" fill="#0f0f0f" stroke="#d4a843"/>
      <text x="795" y="151" fill="#fce8b4">DISCLOSURE</text>
      <text x="795" y="171" fill="#d8b56a">NETWORK</text>
    </g>
    <g>
      <circle cx="220" cy="454" r="54" fill="#0f0f0f" stroke="#c85f88"/>
